    D.totalSpend=D.metaSpend+D.gSpend;D.roas=D.totalSpend>0&&D.tnFac>0?D.tnFac/D.totalSpend:0;D.cpa=(D.metaCompras+D.gConv)>0?D.totalSpend/(D.metaCompras+D.gConv):0;
    D.loaded=true;
  }catch(e){
    console.error(c.name,e);
    if(c.sheetId){try{const sd=await sheetFallback(c);if(sd){Object.assign(D,sd);D.loaded=true;D.fromSheet=true;}}catch(e2){console.error('sheet',e2);}}
  }
  return D;
}
async function sheetFallback(c){
  const{from}=monthRange();const ym=from.substring(0,7);
  async function tab(n){const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${c.sheetId}/values/${encodeURIComponent(n)}?key=${GKEY}`);if(!r.ok)return null;const d=await r.json();return d.values||null;}
  function parse(rows){if(!rows||rows.length<2)return[];const h=rows[0].map(x=>x?x.toString().trim().toLowerCase():'');return rows.slice(1).filter(r=>(r[0]||'').startsWith(ym)).map(r=>{const o={};h.forEach((k,i)=>{o[k]=r[i]||'';});return o;});}
  function s(rows,...keys){return rows.reduce((a,r)=>{for(const k of keys){const v=parseFloat((r[k]||'').replace(/[^0-9.-]/g,''));if(!isNaN(v))return a+v;}return a;},0);}
  const[mR,gR,tnR]=await Promise.all([tab('detrics_meta'),tab('detrics_google'),tab('detrics_tiendanube')]);
  const m=parse(mR),g=parse(gR);
  const metaSpend=s(m,'amount spent','spend');
  const metaCompras=s(m,'website purchases');
  const metaValCompras=s(m,'website purchases conversion value','conversion value');
  const metaWA=s(m,'messaging conversations started','new messaging conversations');
  const mImpr=s(m,'impressions');const metaCpm=mImpr>0?metaSpend/mImpr*1000:0;
  const metaRoas=metaSpend>0&&metaValCompras>0?metaValCompras/metaSpend:0;
  const metaCpa=metaCompras>0?metaSpend/metaCompras:0;
  const gSpend=s(g,'cost');const gClics=s(g,'clicks');const gConv=s(g,'conversions');
  const gImpr=s(g,'impressions');const gCpm=gImpr>0?gSpend/gImpr*1000:0;
  let tnFac=0,tnOrdenes=0;
  if(tnR&&tnR.length>1){const h=tnR[0].map(x=>x?x.toString().trim().toLowerCase():'');const ti=h.findIndex(x=>x.includes('order total')&&!x.includes('usd'));const oi=h.findIndex(x=>x.includes('order id'));const ids=new Set();tnR.slice(1).forEach(r=>{if(!(r[0]||'').startsWith(ym))return;if(oi>=0&&r[oi])ids.add(r[oi]);if(ti>=0)tnFac+=parseFloat((r[ti]||'').replace(/[^0-9.-]/g,''))||0;});tnOrdenes=ids.size;}
  const totalSpend=metaSpend+gSpend;
  return{metaSpend,metaCompras,metaValCompras,metaWA,metaCpm,metaRoas,metaCpa,metaArtCarro:s(m,'website adds to cart','website adds to'),metaInicioPago:s(m,'website checkouts initiated','website checko'),gSpend,gClics,gConv,gCpm,gCtr:0,pMeta:{spend:0,compras:0,valCompras:0,roas:0,cpa:0},pGoogle:{spend:0,clics:0,cpm:0,conv:0},tnFac,tnOrdenes,tnTicket:tnOrdenes>0?tnFac/tnOrdenes:0,pTN:{fac:0,ordenes:0,ticket:0},ga4Total:0,ga4Organic:0,ga4Paid:0,ga4Direct:0,ga4Referral:0,pGA4:{total:0},totalSpend,roas:totalSpend>0&&tnFac>0?tnFac/totalSpend:0,cpa:(metaCompras+gConv)>0?totalSpend/(metaCompras+gConv):0};
}
let clientData={};
function trH(cur,prev,hib=true){
  if(!cur||!prev||prev===0)return'';
  const d=((cur-prev)/Math.abs(prev))*100;
  if(Math.abs(d)<1)return'<span class="tr tn">—</span>';
  const up=d>0,good=hib?up:!up,cls=up?(good?'ug':'ub'):(good?'dg':'db');
  return`<span class="tr ${cls}"><span class="${up?'arr-u':'arr-d'}"></span>${Math.abs(d).toFixed(0)}%</span>`;
}
function mr(lbl,val,tr='',cls=''){
  const v=val?`<span class="mr-v${cls?' '+cls:''}">${val}</span>`:'<span class="mr-dash">—</span>';
  return`<div class="mrow"><span class="mr-l">${lbl}</span><div class="mr-r">${tr}${v}</div></div>`;
}
function buildAlerts(){
  const al=[];
  CLIENTS.forEach(c=>{const d=clientData[c.id];if(!d||!d.loaded)return;if(d.metaSpend===0&&c.meta_acc)al.push({t:'r',m:`<strong>Error de pago — ${c.name}:</strong> gasto $0 con presupuesto activo. Verificar método de pago en Meta Business.`});});
  const ng=CLIENTS.filter(c=>!c.google_acc&&(c.tipo==='ecom'||c.tipo==='mixed'));
  if(ng.length)al.push({t:'y',m:`<strong>Sin Google Ads:</strong> ${ng.map(x=>x.name).join(', ')} — son ecommerce sin campañas en Google. Evaluar Shopping o PMax.`});
  document.getElementById('alerts-wrap').innerHTML=al.map(a=>`<div class="alert alert-${a.t}"><div class="a-icon">!</div><div>${a.m}</div></div>`).join('');
}
function buildCard(c){
  const d=clientData[c.id]||{};
  const p=pct(d.totalSpend||0,c.pres);
  const tipo=c.tipo==='ecom'?'<span class="badge be">ecom</span>':c.tipo==='leads'?'<span class="badge bll">leads</span>':'<span class="badge bm">ecom+wa</span>';
  const src=d.fromSheet?'<span style="font-size:9px;color:var(--tx3);font-family:var(--fm);">↓sheet</span>':'';
  const pills=[];
  if(d.metaSpend===0&&c.meta_acc)pills.push('<span class="badge bp-r">⚠ error pago</span>');
  if(!c.google_acc&&(c.tipo==='ecom'||c.tipo==='mixed'))pills.push('<span class="badge bp-y">sin google</span>');
  const roasC=d.roas>=4?'good':d.roas>0?'warn':'';
  if(!d.loaded)return`<div class="ccard ${c.status}" id="card-${c.id}"><div class="chead"><div class="ch-l"><div><div class="ch-name">${c.name} ${tipo}</div><div class="ch-rubro">${c.rubro}</div></div></div><div style="font-size:11px;color:var(--tx3);padding-right:8px;">Cargando...</div></div></div>`;
  const metaBlock=`<div class="cblock"><div class="cb-title" style="color:var(--bl);">Meta Ads</div>${mr('Gasto vs ppto',d.metaSpend>0?`${fkp(d.metaSpend)}<span style="color:var(--tx3);font-size:10px;"> / ${fkp(c.pres)}</span>`:null,'',pct(d.metaSpend,c.pres)>90?'warn':'')}${mr('Ventas',d.metaCompras>0?d.metaCompras:null,trH(d.metaCompras,d.pMeta.compras))}${mr('Val. ventas',fk(d.metaValCompras),trH(d.metaValCompras,d.pMeta.valCompras))}${mr('CPA',fk(d.metaCpa),trH(d.metaCpa,d.pMeta.cpa,false),d.metaCpa>50000?'warn':'')}${mr('ROAS',d.metaRoas>0?d.metaRoas.toFixed(2)+'x':null,trH(d.metaRoas,d.pMeta.roas),d.metaRoas>=4?'good':d.metaRoas>0?'warn':'')}<span class="vs-lbl">vs mes anterior</span></div>`;
  const googleNeg=`<div class="cblock"><div class="cb-title" style="color:var(--gr);">Google Ads</div>${!c.google_acc?`<div class="no-g">Sin Google Ads activo.<br>Evaluar Shopping<br>o Performance Max.</div>`:`${mr('Gasto',d.gSpend>0?fkp(d.gSpend):null,trH(d.gSpend,d.pGoogle.spend))}${mr('CPM',d.gCpm>0?'$'+Math.round(d.gCpm):null,trH(d.gCpm,d.pGoogle.cpm,false))}${mr('Clics',d.gClics>0?d.gClics.toLocaleString('es-AR'):null,trH(d.gClics,d.pGoogle.clics))}${mr('CTR',d.gCtr>0?(d.gCtr*100).toFixed(1)+'%':null)}${mr('Conv.',d.gConv>0?Math.round(d.gConv):null,trH(d.gConv,d.pGoogle.conv))}<span class="vs-lbl">vs mes anterior</span>`}<hr class="neg-div"><div class="cb-title" style="color:var(--am);">Negocio</div>${c.tipo==='leads'||c.tipo==='mixed'?mr('Conv. WA',d.metaWA>0?Math.round(d.metaWA):null,trH(d.metaWA,0)):''}${c.tipo!=='leads'?`${mr('Facturación',fk(d.tnFac),trH(d.tnFac,d.pTN.fac))}${mr('Órdenes',d.tnOrdenes>0?d.tnOrdenes:null,trH(d.tnOrdenes,d.pTN.ordenes))}${mr('Ticket prom.',fk(d.tnTicket),trH(d.tnTicket,d.pTN.ticket))}`:''}`,
  ga4Block=`<div class="cblock"><div class="cb-title" style="color:var(--pu);">GA4 · Tráfico</div><div class="ga4-total"><div><div style="font-size:9px;color:var(--tx3);font-family:var(--fm);margin-bottom:3px;">Sesiones totales</div><div class="ga4-big">${d.ga4Total>0?d.ga4Total.toLocaleString('es-AR'):'—'} ${trH(d.ga4Total,d.pGA4.total)}</div></div><div style="text-align:right;"><div style="font-size:9px;color:var(--tx3);font-family:var(--fm);margin-bottom:3px;">Mes anterior</div><div class="ga4-prev">${d.pGA4.total>0?d.pGA4.total.toLocaleString('es-AR'):'—'}</div></div></div><div class="src-lbl-top">Por fuente</div><div class="src-row"><span class="src-l"><span class="src-dot" style="background:var(--gr)"></span>Orgánico</span><span class="src-v">${d.ga4Organic>0?d.ga4Organic.toLocaleString('es-AR'):'—'}</span></div><div class="src-row"><span class="src-l"><span class="src-dot" style="background:var(--bl)"></span>Paid</span><span class="src-v">${d.ga4Paid>0?d.ga4Paid.toLocaleString('es-AR'):'—'}</span></div><div class="src-row"><span class="src-l"><span class="src-dot" style="background:var(--tx3)"></span>Directo</span><span class="src-v">${d.ga4Direct>0?d.ga4Direct.toLocaleString('es-AR'):'—'}</span></div>${d.ga4Referral>0?`<div class="src-row"><span class="src-l"><span class="src-dot" style="background:var(--pu)"></span>Referral</span><span class="src-v">${d.ga4Referral.toLocaleString('es-AR')}</span></div>`:''}</div>`;
  return`<div class="ccard ${c.status}" id="card-${c.id}"><div class="chead" onclick="toggleCard('${c.id}')"><div class="ch-l"><div><div class="ch-name">${c.name} ${tipo} ${src} ${pills.join(' ')}</div><div class="ch-rubro">${c.rubro}</div></div></div><div class="ch-r"><div class="ch-stat"><div class="ch-stat-lbl">ROAS global</div><div class="ch-stat-val ${roasC}">${d.roas>0?d.roas.toFixed(2)+'x':'—'}</div></div><div class="ch-stat"><div class="ch-stat-lbl">Facturación TN</div><div class="ch-stat-val">${fkp(d.tnFac)}</div></div><div class="ch-stat"><div class="ch-stat-lbl">Gasto ejecutado</div><div class="ch-stat-val">${fkp(d.totalSpend)||'$0'}</div><div class="bbar-bg"><div class="bbar-f" style="width:${Math.min(p,100)}%;background:${brc(p)}"></div></div><div class="ch-stat-sub">${p}% del ppto</div></div><span class="caret">›</span></div></div><div class="cbody" id="body-${c.id}">${metaBlock}${googleNeg}${ga4Block}</div></div>`;
}
function toggleCard(id){
  const body=document.getElementById('body-'+id);
  const card=document.getElementById('card-'+id);
  const open=body.classList.contains('visible');
  body.classList.toggle('visible',!open);
  card.classList.toggle('open',!open);
}
function renderSem(){
  const ok=CLIENTS.filter(c=>c.status==='ok'),aj=CLIENTS.filter(c=>c.status==='ajustar'),al=CLIENTS.filter(c=>c.status==='alerta');
  document.getElementById('s-ok').textContent=ok.length;document.getElementById('s-warn').textContent=aj.length;document.getElementById('s-bad').textContent=al.length;
  document.getElementById('s-ok-n').textContent=ok.map(c=>c.name).join(' · ');document.getElementById('s-warn-n').textContent=aj.map(c=>c.name).join(' · ');document.getElementById('s-bad-n').textContent=al.length?al.map(c=>c.name).join(' · '):'—';
}
function sendEmail(){
  const now=new Date();
  const fecha=now.toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'});
  const mes=now.toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  let totS=0,totF=0,semV=[],semA=[],semR=[],lines=[],alertas=[];
  CLIENTS.forEach(c=>{
    const d=clientData[c.id];if(!d||!d.loaded)return;
    totS+=d.totalSpend||0;totF+=d.tnFac||0;
    if(c.status==='ok')semV.push(c.name);else if(c.status==='ajustar')semA.push(c.name);else semR.push(c.name);
    const p=pct(d.totalSpend,c.pres);
    lines.push(`${c.name.padEnd(18)} | Gasto: ${fkp(d.totalSpend).padEnd(8)} (${p}% ppto) | Fac: ${fkp(d.tnFac).padEnd(8)} | ROAS: ${d.roas>0?d.roas.toFixed(2)+'x':'—'} | Sesiones: ${d.ga4Total>0?d.ga4Total.toLocaleString('es-AR'):'—'}`);
    if(d.metaSpend===0&&c.meta_acc)alertas.push(`⚠ ${c.name}: gasto Meta $0 — verificar pago.`);
    if(d.metaRoas>0&&d.metaRoas<2.5)alertas.push(`⚠ ${c.name}: ROAS Meta bajo (${d.metaRoas.toFixed(2)}x).`);
    if(pct(d.totalSpend,c.pres)<35)alertas.push(`⚠ ${c.name}: presupuesto ejecutado solo ${pct(d.totalSpend,c.pres)}%.`);
  });
  const subj=encodeURIComponent(`Resumen semanal Jump Digital — ${fecha}`);
  const body=encodeURIComponent(`Hola Agustina y Manuel,\n\nResumen semanal al ${fecha}.\n\n━━━ RESUMEN — ${mes.toUpperCase()} ━━━\nInversión total: ${fkp(totS)}\nFacturación TN: ${fkp(totF)}\nROAS global: ${totS>0&&totF>0?(totF/totS).toFixed(2)+'x':'—'}\n\n🟢 VIENEN BIEN (${semV.length}): ${semV.join(', ')}\n🟡 REVISAR (${semA.length}): ${semA.join(', ')}\n🔴 ATENCIÓN (${semR.length}): ${semR.length?semR.join(', '):'—'}\n\n━━━ DETALLE ━━━\n${lines.join('\n')}${alertas.length?'\n\n━━━ ALERTAS ━━━\n'+alertas.join('\n'):''}\n\nSaludos,\nJump Digital Command Center`);
  window.open(`mailto:agustina@jumpdigital.com.ar,manuel@jumpdigital.com.ar?subject=${subj}&body=${body}`);
}
async function loadAll(){
  document.getElementById('loading').style.display='block';
  renderSem();
  document.getElementById('clients').innerHTML=CLIENTS.map(c=>`<div class="ccard ${c.status}" id="card-${c.id}"><div class="chead"><div class="ch-l"><div><div class="ch-name">${c.name}</div><div class="ch-rubro">${c.rubro}</div></div></div><div style="font-size:11px;color:var(--tx3);padding-right:8px;">Cargando...</div></div></div>`).join('');
  document.getElementById('loading').style.display='none';
  await Promise.all(CLIENTS.map(async c=>{
    clientData[c.id]=await loadClient(c);
    const el=document.getElementById('card-'+c.id);
    if(el)el.outerHTML=buildCard(c);
  }));
  renderSem();buildAlerts();
  const n=new Date();
  document.getElementById('ts').textContent=`Actualizado ${n.toLocaleDateString('es-AR')} ${n.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
}
